<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechEng Master: Pure Mechanical Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <h2>Mech Master</h2>
        <div class="nav-group">
            <h3>Phase 1: Foundations</h3>
            <button onclick="loadModule('thermo')">Thermodynamics</button>
            <button onclick="loadModule('solids')">Solid Mechanics</button>
            <button onclick="loadModule('fluids')">Fluid Mechanics</button>
            <button onclick="loadModule('kinematics')">Kinematics</button>
        </div>
        <div class="nav-group">
            <h3>Phase 2: Automotive</h3>
            <button onclick="loadModule('powertrain')">Powertrain</button>
            <button onclick="loadModule('dynamics')">Vehicle Dynamics</button>
            <button onclick="loadModule('aero')">Aerodynamics</button>
        </div>
    </nav>

    <main id="app-container">
        <div id="welcome-screen">
            <h1>Select a Concept to Recap</h1>
            <p>A pure mechanical and automotive engineering dashboard.</p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="modules/thermo.js"></script>
    <script src="modules/solids.js"></script>
    <script src="app.js"></script>
</body>
</html>
